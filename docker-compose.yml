version: '3.8'

# Multi-container setup:
#   postgres   — primary database
#   redis      — caching / session store
#   backend    — Spring Boot API (port 8080)
#   frontend   — React SPA served by nginx (port 3000 → 80)

services:
  postgres:
    image: postgres:16-alpine
    container_name: carpool-postgres
    environment:
      POSTGRES_DB: carpool_db
      POSTGRES_USER: carpool_user
      POSTGRES_PASSWORD: carpool_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carpool_user -d carpool_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: carpool-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carpool-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carpool_db
      SPRING_DATASOURCE_USERNAME: carpool_user
      SPRING_DATASOURCE_PASSWORD: carpool_pass
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-256-bit-secret}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carpool-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_logs:
