spring:
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: payout-processor
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.carpool.dto
        spring.json.value.default.type: com.carpool.dto.PayoutEventMessage
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/carpool_db}
    username: ${SPRING_DATASOURCE_USERNAME:carpool_user}
    password: ${SPRING_DATASOURCE_PASSWORD:carpool_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  data:
    web:
      pageable:
        default-page-size: 20

server:
  port: 8080

upload:
  dir: uploads
  base-url: https://carroll-control-lenses-despite.trycloudflare.com

cashfree:
  app-id: ${CASHFREE_APP_ID}
  secret-key: ${CASHFREE_SECRET_KEY}
  base-url: ${CASHFREE_BASE_URL:https://sandbox.cashfree.com/pg}
  api-version: "2023-08-01"
  # Payouts product uses separate credentials — set these after enabling Payouts in Cashfree dashboard
  payouts-app-id: ${CASHFREE_PAYOUTS_APP_ID:}
  payouts-secret-key: ${CASHFREE_PAYOUTS_SECRET_KEY:}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-at-least-256-bits-long-change-in-production-now}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.carpool: DEBUG
    org.springframework.security: WARN
